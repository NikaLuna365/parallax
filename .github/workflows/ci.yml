name: parallax-plugin-ci

on:
  push:
  pull_request:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install jsonschema
      - name: Run plugin self-tests
        run: bash tests/run.sh
